name: Terraform RDS

on:
  workflow_dispatch:  # adds manual trigger button
  push:
    branches: [main]
    paths: ['rds/**']
  pull_request:
    branches: [main]
    paths: ['rds/**']

env:
  TF_WORKING_DIR: ./rds

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest
    environment: production

    permissions:
      id-token: write       # Required for OIDC
      contents: read
      pull-requests: write  # Required to post PR comments

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}  # arn:aws:iam::YOUR_ACCOUNT_ID:role/YOUR_ROLE_NAME
          aws-region: us-east-1

      - name: Verify Identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Import Existing Resources
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          # Check and import subnet group if it exists
          if aws rds describe-db-subnet-groups \
            --db-subnet-group-name free-tier-subnet-group \
            --query 'DBSubnetGroups[0].DBSubnetGroupName' \
            --output text 2>/dev/null | grep -q "free-tier-subnet-group"; then
            echo "Subnet group exists, importing..."
            terraform import aws_db_subnet_group.default free-tier-subnet-group || true
          else
            echo "Subnet group does not exist, will be created"
          fi

          # Check and import security group if it exists
          SG_ID=$(aws ec2 describe-security-groups \
            --filters Name=group-name,Values=free-tier-rds-sg \
            --query 'SecurityGroups[0].GroupId' \
            --output text 2>/dev/null)
          if [ "$SG_ID" != "None" ] && [ -n "$SG_ID" ]; then
            echo "Security group exists ($SG_ID), importing..."
            terraform import aws_security_group.rds_sg $SG_ID || true
          else
            echo "Security group does not exist, will be created"
          fi

          # Check and import SSM parameters if they exist
          for PARAM in /myapp/rds/endpoint /myapp/rds/port /myapp/rds/db_name /myapp/rds/password; do
            if aws ssm get-parameter --name "$PARAM" 2>/dev/null; then
              RESOURCE=$(echo $PARAM | sed 's|/myapp/rds/||')
              echo "SSM parameter $PARAM exists, importing..."
              terraform import aws_ssm_parameter.rds_$RESOURCE $PARAM || true
            fi
          done
        env:
          TF_VAR_DB_PASSWORD: ${{ secrets.TF_VAR_DB_PASSWORD }}

      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -out=tfplan 2>&1 | tee tfplan.txt
        env:
          TF_VAR_DB_PASSWORD: ${{ secrets.TF_VAR_DB_PASSWORD }}

      # Post plan output to PR as a comment
      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const plan = require('fs').readFileSync('${{ env.TF_WORKING_DIR }}/tfplan.txt', 'utf8')
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `\`\`\`hcl\n${plan}\n\`\`\``
            })

      # Only apply on push to main (not PRs)
      - name: Terraform Apply
        if: | 
          (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_DB_PASSWORD: ${{ secrets.TF_VAR_DB_PASSWORD }}

      - name: Verify RDS Instance
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          aws rds describe-db-instances \
            --query 'DBInstances[*].[DBInstanceIdentifier,DBInstanceStatus]' \
            --output table

      - name: Verify SSM Parameters
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          aws ssm get-parameters-by-path \
            --path /myapp/ \
            --recursive \
            --query 'Parameters[*].[Name,LastModifiedDate]' \
            --output table